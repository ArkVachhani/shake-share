          cat > lib/screens/home_screen.dart << 'DARTEOF'
import 'dart:io';
import 'dart:typed_data';
import 'package:flutter/material.dart';
import 'package:flutter_animate/flutter_animate.dart';
import 'package:google_fonts/google_fonts.dart';
import 'package:image_picker/image_picker.dart';
import 'package:permission_handler/permission_handler.dart';
import 'package:vibration/vibration.dart';
import '../services/nearby_service.dart';
import '../services/shake_service.dart';
import '../widgets/radar_widget.dart';

class HomeScreen extends StatefulWidget {
  const HomeScreen({super.key});
  @override
  State<HomeScreen> createState() => _HomeScreenState();
}

class _HomeScreenState extends State<HomeScreen> {
  final NearbyService _nearby = NearbyService();
  final ShakeService _shake = ShakeService();
  final ImagePicker _picker = ImagePicker();
  bool _isSearching = false, _transferring = false, _done = false;
  double _progress = 0;
  List<DeviceInfo> _devices = [];
  String _status = 'Shake your phone to find nearby devices';
  String _deviceName = '';
  static const _orange = Color(0xFFF97316);
  static const _bg = Color(0xFF0F0F0F);
  static const _card = Color(0xFF1A1A1A);

  @override
  void initState() {
    super.initState();
    _deviceName = 'SS-${DateTime.now().millisecondsSinceEpoch % 9000 + 1000}';
    _nearby.setUserName(_deviceName);
    _requestPermissions();
    _setupCallbacks();
    _shake.start(_onShake);
  }

  Future<void> _requestPermissions() async {
    await [Permission.location, Permission.bluetooth, Permission.bluetoothScan,
      Permission.bluetoothAdvertise, Permission.bluetoothConnect,
      Permission.nearbyWifiDevices, Permission.photos, Permission.storage].request();
  }

  void _setupCallbacks() {
    _nearby.onDeviceFound = (d) { if (!mounted) return; setState(() {
      if (!_devices.any((x) => x.endpointId == d.endpointId)) { _devices.add(d); _status = '${_devices.length} device(s) found!'; }
    }); };
    _nearby.onDeviceLost = (id) { if (!mounted) return; setState(() {
      _devices.removeWhere((d) => d.endpointId == id);
      if (_devices.isEmpty && _isSearching) _status = 'Searching...';
    }); };
    _nearby.onIncomingRequest = (id, name) => _showDialog(id, name);
    _nearby.onConnectionResult = (ok) { if (!mounted) return;
      setState(() { _status = ok ? 'Connected! Select what to share below' : 'Failed. Try again.'; }); };
    _nearby.onDataReceived = (data) { if (!mounted) return;
      setState(() { _transferring = false; _done = true; _progress = 1.0; _status = 'File received!'; }); };
    _nearby.onProgress = (p) { if (mounted) setState(() => _progress = p); };
    _nearby.onDisconnected = () { if (!mounted) return;
      setState(() { _isSearching = false; _devices.clear(); _status = 'Disconnected. Shake to reconnect.'; }); };
  }

  void _onShake() {
    if (_isSearching || _transferring) return;
    Vibration.vibrate(duration: 150);
    setState(() { _isSearching = true; _done = false; _devices.clear(); _status = 'Searching for nearby devices...'; });
    _nearby.startSearching();
  }

  void _showDialog(String endpointId, String deviceName) {
    if (!mounted) return;
    showModalBottomSheet(context: context, backgroundColor: _card,
      shape: const RoundedRectangleBorder(borderRadius: BorderRadius.vertical(top: Radius.circular(24))),
      builder: (_) => SafeArea(child: Padding(padding: const EdgeInsets.fromLTRB(24, 12, 24, 24),
        child: Column(mainAxisSize: MainAxisSize.min, children: [
          Container(width: 40, height: 4, decoration: BoxDecoration(color: Colors.grey.shade700, borderRadius: BorderRadius.circular(2))),
          const SizedBox(height: 20),
          Container(width: 68, height: 68,
            decoration: BoxDecoration(shape: BoxShape.circle, color: _orange.withOpacity(0.12), border: Border.all(color: _orange, width: 2)),
            child: const Icon(Icons.phone_android, color: _orange, size: 32)),
          const SizedBox(height: 14),
          Text(deviceName, style: GoogleFonts.poppins(color: Colors.white, fontSize: 17, fontWeight: FontWeight.w700)),
          const SizedBox(height: 4),
          Text('wants to send you files', style: GoogleFonts.poppins(color: Colors.grey, fontSize: 13)),
          const SizedBox(height: 28),
          Row(children: [
            Expanded(child: OutlinedButton(
              onPressed: () { Navigator.pop(context); _nearby.rejectConnection(endpointId); },
              style: OutlinedButton.styleFrom(side: const BorderSide(color: Colors.redAccent), padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12))),
              child: Text('Decline', style: GoogleFonts.poppins(color: Colors.redAccent, fontWeight: FontWeight.w600)))),
            const SizedBox(width: 12),
            Expanded(child: ElevatedButton(
              onPressed: () { Navigator.pop(context); _nearby.acceptConnection(endpointId);
                setState(() { _transferring = true; _progress = 0; _status = 'Ready to receive...'; }); },
              style: ElevatedButton.styleFrom(backgroundColor: _orange, padding: const EdgeInsets.symmetric(vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12))),
              child: Text('Accept', style: GoogleFonts.poppins(color: Colors.white, fontWeight: FontWeight.w700)))),
          ]),
        ]))));
  }

  Future<void> _sendPhoto() async {
    if (_nearby.connectedId == null) { _snack('Shake first and connect to a device!'); return; }
    final img = await _picker.pickImage(source: ImageSource.gallery, imageQuality: 70);
    if (img == null) return;
    final Uint8List bytes = await File(img.path).readAsBytes();
    setState(() { _transferring = true; _done = false; _progress = 0; _status = 'Sending photo...'; });
    final ok = await _nearby.sendBytes(_nearby.connectedId!, bytes);
    if (!mounted) return;
    setState(() { _transferring = !ok; _done = ok; _progress = ok ? 1.0 : 0; _status = ok ? 'Photo sent! âœ“' : 'Send failed.'; });
  }

  Future<void> _stopAll() async {
    await _nearby.stopAll();
    setState(() { _isSearching = false; _devices.clear(); _transferring = false; _done = false; _progress = 0; _status = 'Shake your phone to find nearby devices'; });
  }

  void _snack(String msg) => ScaffoldMessenger.of(context).showSnackBar(SnackBar(
    content: Text(msg, style: GoogleFonts.poppins(fontSize: 13)), backgroundColor: _card,
    behavior: SnackBarBehavior.floating, shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
    margin: const EdgeInsets.all(16)));

  @override
  void dispose() { _shake.stop(); _nearby.stopAll(); super.dispose(); }

  @override
  Widget build(BuildContext context) {
    return Scaffold(backgroundColor: _bg, body: SafeArea(child: Padding(
      padding: const EdgeInsets.symmetric(horizontal: 20),
      child: Column(children: [
        const SizedBox(height: 20), _header(), const SizedBox(height: 16),
        Expanded(child: _body()), _shareRow(), const SizedBox(height: 20)]))));
  }

  Widget _header() => Row(mainAxisAlignment: MainAxisAlignment.spaceBetween, children: [
    Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
      Text('ShakeShare', style: GoogleFonts.poppins(color: _orange, fontSize: 22, fontWeight: FontWeight.w800, letterSpacing: -0.5)),
      Text(_deviceName, style: GoogleFonts.poppins(color: Colors.grey.shade600, fontSize: 12))]),
    if (_isSearching || _transferring)
      GestureDetector(onTap: _stopAll, child: Container(
        padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 8),
        decoration: BoxDecoration(color: Colors.red.withOpacity(0.12), borderRadius: BorderRadius.circular(20), border: Border.all(color: Colors.red.withOpacity(0.35))),
        child: Row(children: [const Icon(Icons.stop_rounded, color: Colors.redAccent, size: 16), const SizedBox(width: 5),
          Text('Stop', style: GoogleFonts.poppins(color: Colors.redAccent, fontSize: 13))]))),
  ]);

  Widget _body() {
    if (_transferring || _done) return _transferView();
    return Column(children: [
      Expanded(child: Center(child: RadarWidget(isActive: _isSearching))),
      Text(_status, textAlign: TextAlign.center, style: GoogleFonts.poppins(color: Colors.white.withOpacity(0.75), fontSize: 14, height: 1.5)).animate().fadeIn(duration: 300.ms),
      const SizedBox(height: 16),
      if (_devices.isNotEmpty) Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
        Text('NEARBY', style: GoogleFonts.poppins(color: Colors.grey.shade600, fontSize: 10, fontWeight: FontWeight.w700, letterSpacing: 1.2)),
        const SizedBox(height: 8),
        ..._devices.map((d) => Container(margin: const EdgeInsets.only(bottom: 8),
          padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 12),
          decoration: BoxDecoration(color: _card, borderRadius: BorderRadius.circular(14), border: Border.all(color: _orange.withOpacity(0.2))),
          child: Row(children: [
            Container(width: 38, height: 38, decoration: BoxDecoration(shape: BoxShape.circle, color: _orange.withOpacity(0.1)),
              child: const Icon(Icons.phone_android, color: _orange, size: 18)),
            const SizedBox(width: 12),
            Expanded(child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
              Text(d.name, style: GoogleFonts.poppins(color: Colors.white, fontWeight: FontWeight.w600, fontSize: 13)),
              Text('Tap to connect', style: GoogleFonts.poppins(color: Colors.grey, fontSize: 11))])),
            ElevatedButton(onPressed: () => _nearby.requestConnection(d.endpointId),
              style: ElevatedButton.styleFrom(backgroundColor: _orange, padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 8),
                shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(10)), minimumSize: Size.zero, tapTargetSize: MaterialTapTargetSize.shrinkWrap),
              child: Text('Connect', style: GoogleFonts.poppins(color: Colors.white, fontSize: 12, fontWeight: FontWeight.w700))),
          ])).animate().slideX(begin: 0.15, curve: Curves.easeOut).fadeIn(duration: 250.ms)),
      ]),
      if (!_isSearching) Padding(padding: const EdgeInsets.only(top: 12, bottom: 8),
        child: Row(mainAxisAlignment: MainAxisAlignment.center, children: [
          const Icon(Icons.vibration, color: Colors.grey, size: 15), const SizedBox(width: 6),
          Text('Shake to start discovering', style: GoogleFonts.poppins(color: Colors.grey, fontSize: 12))])),
    ]);
  }

  Widget _transferView() {
    final color = _done ? Colors.greenAccent : _orange;
    return Column(mainAxisAlignment: MainAxisAlignment.center, children: [
      Container(width: 100, height: 100, decoration: BoxDecoration(shape: BoxShape.circle, color: color.withOpacity(0.1)),
        child: Icon(_done ? Icons.check_circle_outline : Icons.sync, size: 52, color: color))
          .animate(onPlay: (c) => _done ? null : c.repeat()).rotate(duration: _done ? 0.ms : 1200.ms),
      const SizedBox(height: 28),
      Text(_done ? 'Transfer Complete! âœ“' : 'Transferring...', style: GoogleFonts.poppins(color: Colors.white, fontSize: 20, fontWeight: FontWeight.w700)),
      const SizedBox(height: 8),
      Text(_status, style: GoogleFonts.poppins(color: Colors.grey, fontSize: 13)),
      const SizedBox(height: 24),
      ClipRRect(borderRadius: BorderRadius.circular(8), child: LinearProgressIndicator(value: _progress, minHeight: 10, backgroundColor: const Color(0xFF2A2A2A), valueColor: AlwaysStoppedAnimation(color))),
      const SizedBox(height: 8),
      Text('${(_progress * 100).toStringAsFixed(0)}%', style: GoogleFonts.poppins(color: color, fontWeight: FontWeight.w700, fontSize: 16)),
      if (_done) ...[const SizedBox(height: 36), ElevatedButton.icon(
        onPressed: () => setState(() { _done = false; _transferring = false; _progress = 0; }),
        icon: const Icon(Icons.add, size: 18),
        label: Text('Share More', style: GoogleFonts.poppins(color: Colors.white, fontWeight: FontWeight.w700, fontSize: 15)),
        style: ElevatedButton.styleFrom(backgroundColor: _orange, padding: const EdgeInsets.symmetric(horizontal: 36, vertical: 14), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(14))))],
    ]);
  }

  Widget _shareRow() => Row(children: [
    _shareBtn(Icons.photo_library_outlined, 'Photo', _sendPhoto),
    const SizedBox(width: 10),
    _shareBtn(Icons.insert_drive_file_outlined, 'File', () => _snack('Connect to a device first!')),
    const SizedBox(width: 10),
    _shareBtn(Icons.person_outline, 'Contact', () => _snack('Connect to a device first!')),
  ]);

  Widget _shareBtn(IconData icon, String label, VoidCallback onTap) => Expanded(child: GestureDetector(onTap: onTap,
    child: Container(padding: const EdgeInsets.symmetric(vertical: 14),
      decoration: BoxDecoration(color: _card, borderRadius: BorderRadius.circular(16), border: Border.all(color: Colors.white.withOpacity(0.04))),
      child: Column(children: [Icon(icon, color: _orange, size: 26), const SizedBox(height: 5),
        Text(label, style: GoogleFonts.poppins(color: Colors.white60, fontSize: 12, fontWeight: FontWeight.w500))]))));
}
