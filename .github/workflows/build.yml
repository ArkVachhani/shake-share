          cat > lib/services/shake_service.dart << 'EOF'
import 'dart:async';
import 'dart:math';
import 'package:sensors_plus/sensors_plus.dart';
class ShakeService {
  static const double _threshold = 14.0;
  static const int _debounceMs = 900;
  StreamSubscription<AccelerometerEvent>? _sub;
  DateTime? _lastShake;
  void start(void Function() onShake) {
    _sub = accelerometerEventStream(samplingPeriod: SensorInterval.uiInterval).listen((e) {
      final mag = sqrt(e.x * e.x + e.y * e.y + e.z * e.z);
      if (mag > _threshold) {
        final now = DateTime.now();
        if (_lastShake == null || now.difference(_lastShake!).inMilliseconds > _debounceMs) {
          _lastShake = now;
          onShake();
        }
      }
    });
  }
  void stop() { _sub?.cancel(); _sub = null; }
}
EOF

          cat > lib/services/nearby_service.dart << 'EOF'
import 'dart:typed_data';
import 'package:nearby_connections/nearby_connections.dart';
class DeviceInfo {
  final String endpointId;
  final String name;
  const DeviceInfo({required this.endpointId, required this.name});
}
enum NearbyState { idle, searching, connected, transferring, done, error }
class NearbyService {
  static final NearbyService _i = NearbyService._();
  factory NearbyService() => _i;
  NearbyService._();
  static const String _serviceId = 'com.shakeshare.app';
  static const Strategy _strategy = Strategy.P2P_STAR;
  String _userName = 'SS-User';
  String? _connectedId;
  NearbyState _state = NearbyState.idle;
  void Function(DeviceInfo)? onDeviceFound;
  void Function(String)? onDeviceLost;
  void Function(String, String)? onIncomingRequest;
  void Function(bool)? onConnectionResult;
  void Function()? onDisconnected;
  void Function(Uint8List)? onDataReceived;
  void Function(double)? onProgress;
  void Function(NearbyState)? onStateChanged;
  NearbyState get state => _state;
  String? get connectedId => _connectedId;
  void setUserName(String name) => _userName = name;
  void _setState(NearbyState s) { _state = s; onStateChanged?.call(s); }
  Future<bool> startSearching() async {
    try {
      await Nearby().startAdvertising(_userName, _strategy, serviceId: _serviceId,
        onConnectionInitiated: (id, info) { onIncomingRequest?.call(id, info.endpointName); },
        onConnectionResult: (id, status) {
          if (status.isSuccess) { _connectedId = id; _setState(NearbyState.connected); onConnectionResult?.call(true); }
          else { _setState(NearbyState.searching); onConnectionResult?.call(false); }
        },
        onDisconnected: (id) { _connectedId = null; _setState(NearbyState.idle); onDisconnected?.call(); },
      );
      await Nearby().startDiscovery(_userName, _strategy, serviceId: _serviceId,
        onEndpointFound: (id, name, svcId) { onDeviceFound?.call(DeviceInfo(endpointId: id, name: name)); },
        onEndpointLost: (id) { onDeviceLost?.call(id ?? ''); },
      );
      _setState(NearbyState.searching);
      return true;
    } catch (e) { _setState(NearbyState.error); return false; }
  }
  Future<void> requestConnection(String endpointId) async {
    try {
      await Nearby().requestConnection(_userName, endpointId,
        onConnectionInitiated: (id, info) { onIncomingRequest?.call(id, info.endpointName); },
        onConnectionResult: (id, status) {
          if (status.isSuccess) { _connectedId = id; _setState(NearbyState.connected); onConnectionResult?.call(true); }
          else { onConnectionResult?.call(false); }
        },
        onDisconnected: (id) { _connectedId = null; _setState(NearbyState.idle); onDisconnected?.call(); },
      );
    } catch (e) { _setState(NearbyState.error); }
  }
  Future<void> acceptConnection(String endpointId) async {
    try {
      await Nearby().acceptConnection(endpointId,
        onPayLoadRecieved: (id, payload) {
          if (payload.type == PayloadType.BYTES && payload.bytes != null) {
            onDataReceived?.call(payload.bytes!);
            onProgress?.call(1.0);
            _setState(NearbyState.done);
          }
        },
        onPayloadTransferUpdate: (id, update) {
          if (update.totalBytes > 0) onProgress?.call(update.bytesTransferred / update.totalBytes);
          if (update.status == PayloadStatus.SUCCESS) _setState(NearbyState.done);
        },
      );
    } catch (e) { _setState(NearbyState.error); }
  }
  Future<void> rejectConnection(String endpointId) async {
    try { await Nearby().rejectConnection(endpointId); } catch (_) {}
  }
  Future<bool> sendBytes(String endpointId, Uint8List data) async {
    try {
      _setState(NearbyState.transferring);
      await Nearby().sendBytesPayload(endpointId, data);
      onProgress?.call(1.0);
      _setState(NearbyState.done);
      return true;
    } catch (e) { _setState(NearbyState.error); return false; }
  }
  Future<void> stopAll() async {
    try { await Nearby().stopAllEndpoints(); await Nearby().stopAdvertising(); await Nearby().stopDiscovery(); } catch (_) {}
    _connectedId = null;
    _setState(NearbyState.idle);
  }
}
EOF

