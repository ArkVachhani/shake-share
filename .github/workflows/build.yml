import 'package:flutter/material.dart';
class RadarWidget extends StatefulWidget {
  final bool isActive;
  const RadarWidget({super.key, required this.isActive});
  @override
  State<RadarWidget> createState() => _RadarWidgetState();
}
class _RadarWidgetState extends State<RadarWidget> with TickerProviderStateMixin {
  late List<AnimationController> _controllers;
  @override
  void initState() {
    super.initState();
    _controllers = List.generate(3, (i) => AnimationController(vsync: this, duration: const Duration(milliseconds: 2000)));
    for (int i = 0; i < 3; i++) {
      Future.delayed(Duration(milliseconds: i * 650), () { if (mounted) _controllers[i].repeat(); });
    }
  }
  @override
  void dispose() { for (var c in _controllers) c.dispose(); super.dispose(); }
  @override
  Widget build(BuildContext context) {
    return SizedBox(width: 220, height: 220,
      child: Stack(alignment: Alignment.center, children: [
        ..._controllers.map((ctrl) => AnimatedBuilder(animation: ctrl, builder: (_, __) {
          final v = ctrl.value;
          return Container(width: 60.0 + v * 160, height: 60.0 + v * 160,
            decoration: BoxDecoration(shape: BoxShape.circle,
              border: Border.all(color: const Color(0xFFF97316).withOpacity(widget.isActive ? ((1.0 - v) * 0.85).clamp(0.0, 1.0) : 0.08), width: 1.5)));
        })),
        Container(width: 68, height: 68,
          decoration: BoxDecoration(shape: BoxShape.circle, color: const Color(0xFFF97316).withOpacity(0.12), border: Border.all(color: const Color(0xFFF97316), width: 2)),
          child: Icon(widget.isActive ? Icons.wifi_tethering : Icons.phone_android, color: const Color(0xFFF97316), size: 32)),
      ]),
    );
  }
}
